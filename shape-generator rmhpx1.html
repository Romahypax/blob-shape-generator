<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Пятна</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@300;600&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #e8e4db;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Unbounded', sans-serif;
    gap: 28px;
  }
  .label {
    color: #00000020;
    font-size: 9px;
    letter-spacing: 0.5em;
    text-transform: uppercase;
    font-weight: 300;
  }
  .canvas-wrap {
    background: #f8f5ee;
    box-shadow: 0 4px 50px #00000018, 0 0 0 1px #0000000a;
  }
  canvas { display: block; }
  .btn {
    background: transparent;
    border: 1.5px solid #00000022;
    color: #00000066;
    font-family: 'Unbounded', sans-serif;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.45em;
    text-transform: uppercase;
    padding: 16px 52px;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
    outline: none;
  }
  .btn:hover { border-color: #000000aa; color: #111; }
  .btn:active { transform: scale(0.97); }
  .counter { color: #00000020; font-size: 8px; letter-spacing: 0.35em; }
</style>
</head>
<body>
<div class="label">Генератор пятен</div>
<a href="https://vk.com/romahypax" target="_blank" style="color:#00000040;font-family:Unbounded,sans-serif;font-size:8px;letter-spacing:0.4em;text-transform:uppercase;font-weight:300;text-decoration:none;transition:color 0.2s;" onmouseover="this.style.color='#000000aa'" onmouseout="this.style.color='#00000040'">by RomaHypax</a>
<div class="canvas-wrap">
  <canvas id="c" width="620" height="620"></canvas>
</div>
<div style="display:flex;gap:14px;"><button class="btn" onclick="generate()">Новое пятно</button><button class="btn" onclick="exportPNG()">↓ Скачать PNG</button></div>
<div class="counter" id="counter">— нажмите кнопку —</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 620, H = 620, CX = W/2, CY = H/2;
let count = 0;

const rnd  = (a,b) => a + Math.random()*(b-a);
const rndi = (a,b) => Math.floor(rnd(a,b+1));
const TAU  = Math.PI*2;

// ─────────────────────────────────────────────────────────
// POLAR RADIUS FUNCTION r(θ)
// Polar coords guarantee zero self-intersections.
// We make it look NON-circular by:
//   1. Strong ellipse base (rx ≠ ry, rotated)
//   2. Several narrow Gaussian "drip" protrusions
//   3. A few concavities (negative Gaussians)
//   4. Low-freq sine waves for overall organic lean
//   5. Tiny high-freq noise for edge irregularity
// ─────────────────────────────────────────────────────────
function buildR(N) {
  // Raw radius array, one value per angle sample
  const r = new Float32Array(N);

  // 1. ELLIPSE BASE — strongly non-circular
  const rx   = rnd(60, 160);
  const ry   = rnd(30, 100);   // always different from rx
  const rot  = rnd(0, TAU);
  for (let i = 0; i < N; i++) {
    const a = (i/N)*TAU;
    const ca = Math.cos(a - rot), sa = Math.sin(a - rot);
    // polar form of ellipse
    r[i] = (rx*ry) / Math.sqrt(ry*ry*ca*ca + rx*rx*sa*sa);
  }

  // 2. GLOBAL LEAN — one slow sinusoid shifts the whole mass
  const leanAmp   = rnd(15, 55);
  const leanPhase = rnd(0, TAU);
  for (let i = 0; i < N; i++) {
    r[i] += Math.sin((i/N)*TAU + leanPhase) * leanAmp;
  }

  // 3. DRIP / PROTRUSION GAUSSIANS — the key "drip" shapes
  //    Narrow = pointy drip, wide = rounded lobe
  const numDrips = rndi(2, 6);
  for (let d = 0; d < numDrips; d++) {
    const center = rnd(0, TAU);           // angle of drip
    const amp    = rnd(40, 180);          // how far it sticks out
    const width  = rnd(0.08, 0.55);       // angular width in radians — narrow=drip, wide=lobe
    const sharpness = 1 / (2 * width * width);

    for (let i = 0; i < N; i++) {
      let da = (i/N)*TAU - center;
      // wrap to [-π, π]
      if (da >  Math.PI) da -= TAU;
      if (da < -Math.PI) da += TAU;
      r[i] += amp * Math.exp(-da*da * sharpness);
    }
  }

  // 4. CONCAVITIES — indent some regions inward
  const numDents = rndi(1, 3);
  for (let d = 0; d < numDents; d++) {
    const center = rnd(0, TAU);
    const amp    = rnd(15, 60);
    const width  = rnd(0.15, 0.8);
    const sharpness = 1 / (2 * width * width);

    for (let i = 0; i < N; i++) {
      let da = (i/N)*TAU - center;
      if (da >  Math.PI) da -= TAU;
      if (da < -Math.PI) da += TAU;
      // subtract — create concavity
      r[i] -= amp * Math.exp(-da*da * sharpness);
    }
  }

  // 5. MEDIUM WAVES — organic undulation
  const numWaves = rndi(2, 4);
  for (let w = 0; w < numWaves; w++) {
    const freq  = rnd(2, 5);
    const amp   = rnd(8, 30);
    const phase = rnd(0, TAU);
    for (let i = 0; i < N; i++) {
      r[i] += Math.sin((i/N)*TAU*freq + phase) * amp;
    }
  }

  // 6. MICRO NOISE — irregular edge, not smooth circle
  const noiseAmp = rnd(2, 8);
  for (let i = 0; i < N; i++) {
    r[i] += (Math.random()*2-1) * noiseAmp;
  }

  // Clamp: must be positive
  for (let i = 0; i < N; i++) r[i] = Math.max(r[i], 6);

  return r;
}

// ─────────────────────────────────────────────────────────
// SMOOTH the raw radius array (rolling average)
// This eliminates the micro-noise jaggedness while keeping
// drips sharp enough to look like drips.
// ─────────────────────────────────────────────────────────
function smoothR(r, passes, windowSize) {
  const N = r.length;
  for (let p = 0; p < passes; p++) {
    const s = new Float32Array(N);
    for (let i = 0; i < N; i++) {
      let sum = 0;
      for (let k = -windowSize; k <= windowSize; k++) {
        sum += r[(i+k+N)%N];
      }
      s[i] = sum / (2*windowSize+1);
    }
    r.set(s);
  }
  return r;
}

// ─────────────────────────────────────────────────────────
// FIT: scale so shape stays inside canvas with margin
// ─────────────────────────────────────────────────────────
function fitAndCenter(pts, margin) {
  let minX=Infinity,maxX=-Infinity,minY=Infinity,maxY=-Infinity;
  for (const p of pts) {
    if(p.x<minX)minX=p.x; if(p.x>maxX)maxX=p.x;
    if(p.y<minY)minY=p.y; if(p.y>maxY)maxY=p.y;
  }
  const sw=maxX-minX, sh=maxY-minY;
  const avail = Math.min(W,H) - margin*2;
  const scale  = Math.min(1, avail / Math.max(sw, sh, 1));
  const mx = (minX+maxX)/2, my = (minY+maxY)/2;
  return pts.map(p => ({
    x: CX + (p.x-mx)*scale,
    y: CY + (p.y-my)*scale,
  }));
}

// ─────────────────────────────────────────────────────────
// DRAW smooth closed Catmull-Rom spline
// ─────────────────────────────────────────────────────────
function drawCR(pts, tension) {
  const n = pts.length;
  ctx.beginPath();
  for (let i = 0; i < n; i++) {
    const p0=pts[(i-1+n)%n], p1=pts[i],
          p2=pts[(i+1)%n],   p3=pts[(i+2)%n];
    if (i===0) ctx.moveTo(p1.x, p1.y);
    ctx.bezierCurveTo(
      p1.x+(p2.x-p0.x)*tension, p1.y+(p2.y-p0.y)*tension,
      p2.x-(p3.x-p1.x)*tension, p2.y-(p3.y-p1.y)*tension,
      p2.x, p2.y
    );
  }
  ctx.closePath();
  ctx.stroke();
}

// ─────────────────────────────────────────────────────────
// MAIN
// ─────────────────────────────────────────────────────────
let lastPts = null, lastTension = 0.28, lastLW = 2;

function generate() {
  count++;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle = '#f8f5ee';
  ctx.fillRect(0,0,W,H);

  const N = 720;
  let r = buildR(N);
  smoothR(r, 3, 4);

  const raw = Array.from({length:N}, (_,i) => ({
    x: CX + Math.cos((i/N)*TAU) * r[i],
    y: CY + Math.sin((i/N)*TAU) * r[i],
  }));

  const pts     = fitAndCenter(raw, 28);
  const tension = rnd(0.20, 0.35);
  const lw      = rnd(1.6, 2.5);

  lastPts = pts; lastTension = tension; lastLW = lw;

  ctx.strokeStyle = '#141414';
  ctx.lineWidth   = lw;
  ctx.lineCap     = 'round';
  ctx.lineJoin    = 'round';
  ctx.shadowBlur  = 0;

  drawCR(pts, tension);

  document.getElementById('counter').textContent = `пятно #${count}`;
}

// ─────────────────────────────────────────────────────────
// BUILD PATH helper (used by both draw and export)
// ─────────────────────────────────────────────────────────
function buildPath(c, pts, tension) {
  const n = pts.length;
  c.beginPath();
  for (let i = 0; i < n; i++) {
    const p0=pts[(i-1+n)%n], p1=pts[i],
          p2=pts[(i+1)%n],   p3=pts[(i+2)%n];
    if (i===0) c.moveTo(p1.x, p1.y);
    c.bezierCurveTo(
      p1.x+(p2.x-p0.x)*tension, p1.y+(p2.y-p0.y)*tension,
      p2.x-(p3.x-p1.x)*tension, p2.y-(p3.y-p1.y)*tension,
      p2.x, p2.y
    );
  }
  c.closePath();
}

// ─────────────────────────────────────────────────────────
// EXPORT PNG — transparent bg, white fill, black stroke
// ─────────────────────────────────────────────────────────
function exportPNG() {
  if (!lastPts) return;
  const oc = document.createElement('canvas');
  oc.width = W; oc.height = H;
  const oc2 = oc.getContext('2d');

  oc2.clearRect(0,0,W,H);
  buildPath(oc2, lastPts, lastTension);
  oc2.fillStyle   = '#ffffff';
  oc2.fill();
  oc2.strokeStyle = '#141414';
  oc2.lineWidth   = lastLW;
  oc2.lineCap     = 'round';
  oc2.lineJoin    = 'round';
  oc2.stroke();

  const link = document.createElement('a');
  link.download = `pyatno-${count}.png`;
  link.href = oc.toDataURL('image/png');
  link.click();
}

generate();
</script>
</body>
</html>
